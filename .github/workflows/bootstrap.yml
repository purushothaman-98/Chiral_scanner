name: Bootstrap chiral scanner

on:
  push:
    paths:
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Rebuild validated project
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/chunk_* > /tmp/chiral-scanner.b64
          base64 --decode /tmp/chiral-scanner.b64 > /tmp/chiral-scanner.tar.gz
          echo "c9bd7baca83ab2bf6427921814ba96ca97db3e18ee991e9f4db9888cd19ef4e5  /tmp/chiral-scanner.tar.gz" | sha256sum -c -
          tar -xzf /tmp/chiral-scanner.tar.gz
          rm -rf bootstrap
          rm -f bootstrap_payload.b64
          rm -f .github/workflows/bootstrap.yml

      - name: Validate application
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          ruff check .
          pytest -q
          python scripts/validate_data.py

      - name: Publish project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build chiral phonon research scanner"
          git push origin HEAD:main

      - name: Start first metadata scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/metadata-scan.yml/dispatches" \
            -d '{"ref":"main","inputs":{"since":"2026-01-01","initial":"false"}}'

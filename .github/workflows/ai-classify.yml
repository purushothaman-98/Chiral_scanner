name: AI classify arXiv papers

on:
  schedule:
    - cron: "40 0,4,8,12,16,20 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum papers to classify in this run"
        required: false
        default: "20"
        type: string

permissions:
  contents: write
  models: read

concurrency:
  group: chiral-archive-writes
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Classify changed and uncached abstracts with GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4.1-mini' }}
          LIMIT: ${{ inputs.limit || '20' }}
        run: |
          python scripts/classify_ai.py \
            --limit "$LIMIT" \
            --max-limit 25 \
            --sleep 3.5 \
            --output /tmp/chiral_ai_results.json \
            --summary /tmp/chiral_ai_summary.json
      - name: Merge decisions by stable ID and fingerprint
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          python scripts/merge_ai.py --results /tmp/chiral_ai_results.json
          python scripts/record_review_run.py --summary /tmp/chiral_ai_summary.json
          python scripts/validate_data.py
      - name: Commit AI classifications
        run: |
          git add data/papers.json data/review_history.json
          if git diff --cached --quiet; then
            echo "No AI changes"
          else
            git commit -m "Classify chiral phonon papers"
            git push origin HEAD:main
          fi
